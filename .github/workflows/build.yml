name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller pygame-ce
      - run: pyinstaller --onefile --windowed --add-data "assets;assets" monguis.py
      - uses: actions/upload-artifact@v4
        with:
          name: monguis-windows
          path: dist/monguis.exe
